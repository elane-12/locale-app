<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0F0E1A"/>
<title>Locale — Discover What's Worth Your Time</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--brand:#0F0E1A;--gold:#E8A838;--coral:#FF6B6B;--surface:#FAFAF8;--surface2:#F3F1EC;--white:#FFFFFF;--text:#0F0E1A;--text2:#5C5A70;--text3:#9B99AC;--border:rgba(15,14,26,0.1);--border2:rgba(15,14,26,0.2);--open:#2A7A50;--busy:#B85C00;--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--r:16px;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:var(--font-b);background:var(--surface2);display:flex;align-items:flex-start;justify-content:center;}
.app{width:100%;max-width:430px;height:100vh;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:500px){body{align-items:center;padding:20px 16px;height:auto;min-height:100vh;}.app{height:840px;max-height:92vh;border-radius:24px;box-shadow:0 20px 60px rgba(15,14,26,0.18);}}
.topbar{background:var(--brand);padding:16px 18px 0;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.logo{font-family:var(--font-d);font-size:27px;font-weight:800;color:#fff;letter-spacing:-1.5px;}
.logo em{color:var(--gold);font-style:normal;}
.logo span{font-weight:400;font-size:14px;color:rgba(255,255,255,0.35);letter-spacing:0;vertical-align:middle;margin-left:4px;}
.city-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:30px;padding:7px 13px;cursor:pointer;font-family:var(--font-b);color:#fff;font-size:13px;font-weight:500;}
.topbar-tagline{font-size:12px;color:rgba(255,255,255,0.4);font-weight:300;padding-bottom:14px;}
.city-overlay{position:fixed;inset:0;background:rgba(15,14,26,0.6);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.city-overlay.open{display:flex;}
@media(min-width:500px){.city-overlay{align-items:center;}}
.city-modal{width:100%;max-width:430px;background:var(--white);border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;}
@media(min-width:500px){.city-modal{border-radius:20px;}}
.city-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.city-head-title{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text);}
.city-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:16px;}
.city-grid{display:grid;grid-template-columns:1fr 1fr;}
.city-item{display:flex;align-items:center;gap:10px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.city-item:hover{background:var(--surface2);}
.city-item.active .city-n{color:var(--brand);font-weight:600;}
.city-e{font-size:20px;}
.city-n{font-size:13px;color:var(--text2);}
.tabs{display:flex;background:var(--brand);padding:0 10px;flex-shrink:0;}
.tab{flex:1;padding:9px 4px 11px;font-family:var(--font-d);font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:rgba(255,255,255,0.38);letter-spacing:0.8px;text-transform:uppercase;border-bottom:2.5px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.filters{display:flex;gap:7px;padding:11px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);}
.filters::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:6px 14px;font-family:var(--font-b);font-size:12px;font-weight:500;border-radius:30px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand);}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;}
.pane{display:none;flex-direction:column;gap:14px;padding:14px 16px;}
.pane.active{display:flex;}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;transition:box-shadow 0.2s,transform 0.15s;}
.card:hover{box-shadow:0 4px 20px rgba(15,14,26,0.09);transform:translateY(-1px);}
.card-hero{height:124px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;}
.type-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;font-family:var(--font-d);letter-spacing:0.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.tb-r{background:#FFF0E0;color:#A04800;}.tb-h{background:#EDE7F6;color:#512DA8;}.tb-t{background:#E4F3EB;color:#1B5E35;}
.rating-pill{position:absolute;top:10px;right:10px;background:rgba(15,14,26,0.82);color:var(--gold);font-size:12px;font-weight:700;padding:4px 9px;border-radius:8px;font-family:var(--font-d);}
.card-body{padding:13px 14px;}
.card-name{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px;margin-bottom:4px;}
.card-meta{font-size:12px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-open{background:var(--open);}.dot-busy{background:var(--busy);}
.card-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:10px;font-weight:300;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--text2);}
.tag-vibe{background:var(--brand);color:var(--gold);border-color:var(--brand);font-weight:700;font-family:var(--font-d);font-size:10px;letter-spacing:0.5px;text-transform:uppercase;}
.card-footer{display:flex;gap:8px;align-items:center;}
.btn-save{padding:8px 13px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-b);white-space:nowrap;transition:all 0.15s;}
.btn-save.saved{background:var(--gold);color:var(--brand);border-color:var(--gold);font-weight:600;}
.btn-more{flex:1;padding:8px 13px;font-size:13px;font-weight:700;border-radius:10px;background:var(--brand);color:#fff;border:none;cursor:pointer;font-family:var(--font-d);transition:background 0.15s;}
.btn-more:hover{background:#2a284a;}
.social-strip{border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px;}
.avs{display:flex;}
.av{width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;margin-right:-6px;font-family:var(--font-d);}
.stext{font-size:11px;color:var(--text3);margin-left:10px;}
.ai-panel{background:var(--brand);border-radius:var(--r);padding:18px;}
.ai-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ai-blink{width:9px;height:9px;border-radius:50%;background:var(--gold);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.ai-name{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--gold);}
.ai-sub{font-size:11px;color:rgba(255,255,255,0.4);font-weight:300;margin-left:auto;}
.ai-q{font-family:var(--font-d);font-size:19px;font-weight:800;color:#fff;margin-bottom:14px;line-height:1.25;letter-spacing:-0.5px;}
.ai-opts{display:flex;flex-direction:column;gap:8px;}
.ai-opt{padding:11px 14px;font-size:13px;border-radius:10px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.88);cursor:pointer;font-family:var(--font-b);text-align:left;transition:all 0.15s;}
.ai-opt:hover{background:var(--gold);border-color:var(--gold);color:var(--brand);font-weight:600;}
.ai-loading{display:flex;gap:5px;padding:8px 2px;align-items:center;}
.ai-ld{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:ld 1.1s infinite;}
.ai-ld:nth-child(2){animation-delay:0.18s}.ai-ld:nth-child(3){animation-delay:0.36s}
@keyframes ld{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.ai-resp{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:13px;font-size:13px;color:rgba(255,255,255,0.86);line-height:1.65;font-weight:300;}
.ai-resp .hl{color:var(--gold);font-weight:600;font-family:var(--font-d);}
.ai-error{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.3);}
.ai-reset{margin-top:10px;padding:7px 14px;font-size:12px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;font-family:var(--font-b);}
.ask-row{display:flex;gap:8px;margin-top:12px;}
.ask-inp{flex:1;padding:10px 12px;font-size:13px;border-radius:10px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#fff;font-family:var(--font-b);outline:none;}
.ask-inp::placeholder{color:rgba(255,255,255,0.32);}
.ask-inp:focus{border-color:var(--gold);}
.ask-btn{padding:10px 16px;border-radius:10px;background:var(--gold);color:var(--brand);border:none;cursor:pointer;font-weight:700;font-family:var(--font-d);font-size:13px;flex-shrink:0;}
.ask-btn:disabled{opacity:0.45;cursor:default;}
.auth-overlay{position:fixed;inset:0;background:rgba(15,14,26,0.65);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.auth-overlay.open{display:flex;}
.auth-modal{width:100%;max-width:380px;background:#fff;border-radius:20px;overflow:hidden;}
.auth-header{background:var(--brand);padding:24px;text-align:center;}
.auth-logo{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;letter-spacing:-1px;}
.auth-logo em{color:var(--gold);font-style:normal;}
.auth-tagline{font-size:13px;color:rgba(255,255,255,0.5);margin-top:4px;font-weight:300;}
.auth-body{padding:24px;}
.auth-tabs{display:flex;border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:9px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;font-family:var(--font-d);background:transparent;color:var(--text2);border:none;transition:all 0.15s;}
.auth-tab.active{background:var(--brand);color:#fff;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;font-family:var(--font-d);}
.field input{width:100%;padding:11px 13px;font-size:14px;border:1px solid var(--border2);border-radius:10px;font-family:var(--font-b);color:var(--text);outline:none;background:var(--surface);}
.field input:focus{border-color:var(--brand);}
.auth-btn{width:100%;padding:13px;font-size:14px;font-weight:700;border-radius:10px;background:var(--brand);color:#fff;border:none;cursor:pointer;font-family:var(--font-d);margin-top:4px;}
.auth-skip{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font-b);text-decoration:underline;}
.auth-err{font-size:12px;color:var(--coral);margin-top:8px;text-align:center;}
.profile-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.soc-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:14px;display:flex;gap:12px;align-items:flex-start;}
.soc-av{width:40px;height:40px;border-radius:50%;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-d);}
.soc-info{flex:1;min-width:0;}
.soc-name{font-size:13px;font-weight:700;color:var(--text);font-family:var(--font-d);margin-bottom:2px;}
.soc-act{font-size:13px;color:var(--text2);font-weight:300;line-height:1.4;}
.soc-act b{color:var(--text);font-weight:500;}
.soc-time{font-size:11px;color:var(--text3);margin-top:4px;}
.slabel{font-size:10px;font-family:var(--font-d);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding-bottom:4px;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-ico{font-size:40px;margin-bottom:12px;}
.empty-t{font-family:var(--font-d);font-size:15px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.empty-s{font-size:13px;font-weight:300;}
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);transition:color 0.15s;position:relative;}
.nav-btn.active{color:var(--brand);}
.nav-ico{font-size:20px;line-height:1;}
.nav-lbl{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.nav-badge{position:absolute;top:7px;right:calc(50% - 18px);background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card,.soc-card{animation:fadeUp 0.22s ease both;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="logo">loc<em>a</em>le <span>beta</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="profile-btn" id="profile-btn" onclick="openAuth()">👤</button>
        <button class="city-btn" onclick="openCityModal()">
          <span id="city-pin">🤠</span>
          <span id="city-label">College Station</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);margin-left:2px;">▾</span>
        </button>
      </div>
    </div>
    <div class="topbar-tagline" id="topbar-sub">Discover what's worth your time, tonight</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-discover" onclick="switchTab('discover')">Discover</button>
    <button class="tab" id="tab-ai" onclick="switchTab('ai')">AI Pick</button>
    <button class="tab" id="tab-social" onclick="switchTab('social')">Friends</button>
    <button class="tab" id="tab-saved" onclick="switchTab('saved')">Saved</button>
  </div>
  <div class="content">
    <div class="pane active" id="pane-discover" style="padding:0;gap:0;">
      <div class="filters" id="filter-row"></div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:14px;" id="card-feed"></div>
    </div>
    <div class="pane" id="pane-ai">
      <div class="ai-panel">
        <div class="ai-top"><div class="ai-blink"></div><div class="ai-name">Locale AI</div><div class="ai-sub">Powered by Claude</div></div>
        <div class="ai-q" id="ai-q">What's the vibe tonight?</div>
        <div class="ai-opts" id="ai-opts">
          <button class="ai-opt" onclick="aiFlow('casual')">Something casual &amp; laid-back</button>
          <button class="ai-opt" onclick="aiFlow('upscale')">Upscale — I want to impress</button>
          <button class="ai-opt" onclick="aiFlow('adventure')">Something unique &amp; adventurous</button>
          <button class="ai-opt" onclick="aiFlow('family')">Family-friendly fun</button>
        </div>
        <div class="ai-loading" id="ai-loading" style="display:none"><div class="ai-ld"></div><div class="ai-ld"></div><div class="ai-ld"></div></div>
        <div id="ai-result" style="display:none"></div>
        <div class="ask-row" id="ask-row" style="display:none">
          <input class="ask-inp" id="ask-inp" placeholder="Ask anything — budget, diet, mood..." onkeydown="if(event.key==='Enter')sendAsk()"/>
          <button class="ask-btn" id="ask-btn" onclick="sendAsk()">Ask ↗</button>
        </div>
      </div>
      <div id="ai-cards" style="display:flex;flex-direction:column;gap:14px;"></div>
    </div>
    <div class="pane" id="pane-social"><div class="slabel">Friends' Activity</div><div id="social-inner"></div></div>
    <div class="pane" id="pane-saved">
      <div class="slabel">Your Saved Spots</div>
      <div id="saved-inner"><div class="empty"><div class="empty-ico">🔖</div><div class="empty-t">Nothing saved yet</div><div class="empty-s">Tap + Save on any spot</div></div></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-discover" onclick="switchTab('discover')"><div class="nav-ico">🗺</div><div class="nav-lbl">Discover</div></button>
    <button class="nav-btn" id="nav-ai" onclick="switchTab('ai')"><div class="nav-ico">✨</div><div class="nav-lbl">AI Pick</div></button>
    <button class="nav-btn" id="nav-social" onclick="switchTab('social')"><div class="nav-ico">👥</div><div class="nav-lbl">Friends</div></button>
    <button class="nav-btn" id="nav-saved" onclick="switchTab('saved')"><div class="nav-ico">🔖</div><div class="nav-lbl">Saved</div><div class="nav-badge" id="saved-badge">0</div></button>
  </div>
</div>
<div class="city-overlay" id="city-overlay">
  <div class="city-modal">
    <div class="city-head"><div class="city-head-title">Choose a City</div><button class="city-close" onclick="document.getElementById('city-overlay').classList.remove('open')">✕</button></div>
    <div class="city-grid" id="city-grid"></div>
  </div>
</div>
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-modal">
    <div class="auth-header"><div class="auth-logo">loc<em>a</em>le</div><div class="auth-tagline">Join the community. Save your spots.</div></div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="atab-login" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" id="atab-register" onclick="switchAuthTab('register')">Join Free</button>
      </div>
      <div id="auth-login-form">
        <div class="field"><label>Username</label><input id="login-user" type="text" placeholder="your username"/></div>
        <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="you@email.com"/></div>
        <button class="auth-btn" onclick="doAuth('login')">Sign In</button>
      </div>
      <div id="auth-register-form" style="display:none">
        <div class="field"><label>Username</label><input id="reg-user" type="text" placeholder="coolexplorer42"/></div>
        <div class="field"><label>Email</label><input id="reg-email" type="email" placeholder="you@email.com"/></div>
        <button class="auth-btn" onclick="doAuth('register')">Create Account</button>
      </div>
      <div class="auth-err" id="auth-err"></div>
      <button class="auth-skip" onclick="document.getElementById('auth-overlay').classList.remove('open')">Skip for now →</button>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script>
const SOCIAL=[
  {av:'AJ',c:'#EDE7F6',tc:'#512DA8',name:'Alex J.',act:"checked in at <b>Layne's Chicken Fingers</b>",t:'2h ago',e:'🍗'},
  {av:'SR',c:'#E4F3EB',tc:'#1B5E35',name:'Sara R.',act:'rated <b>The George Hotel</b> ★★★★★',t:'Yesterday',e:'⭐'},
  {av:'TK',c:'#FFF0E0',tc:'#A04800',name:'Tina K.',act:'is at <b>All Star Lanes</b> right now!',t:'Just now',e:'🎳'},
  {av:'MB',c:'#EDE7F6',tc:'#512DA8',name:'Marco B.',act:"posted a photo at <b>Torchy's Tacos</b>",t:'3h ago',e:'📸'},
  {av:'JD',c:'#E4F3EB',tc:'#1B5E35',name:'Jade D.',act:'recommends <b>Messina Hof Winery</b> for date night',t:'2 days ago',e:'🍷'},
  {av:'RW',c:'#FFF0E0',tc:'#A04800',name:'Ryan W.',act:'saved 3 spots in <b>Austin, TX</b>',t:'4h ago',e:'🔖'},
];
const AI_STEP2={
  casual:{q:"How many people?",opts:["Just me","Two of us","Small group (3–5)","Big group (6+)"]},
  upscale:{q:"What's the occasion?",opts:["Date night","Business dinner","Celebration","Just treating myself"]},
  adventure:{q:"How adventurous?",opts:["Mildly off the beaten path","Totally unique experience","Outdoor & nature","Cultural discovery"]},
  family:{q:"Ages in the group?",opts:["Toddlers (0–5)","Kids (6–12)","Teens","Mixed ages"]},
};
let cityId='college-station-tx',filter='All',savedIds=new Set(),currentTab='discover',currentUser=null,aiChoice='';
const FILTERS=['All','Restaurants','Hotels','Things To Do','Date Night','Trending','Open Now'];
function D(){return window.LOCALE_DATA||{cities:[],places:{}};}
function places(){return D().places[cityId]||[];}
function cityInfo(){return D().cities.find(c=>c.id===cityId)||{label:'Your City',emoji:'📍'};}
function heroBg(t){return{restaurant:'#FFF0E0',hotel:'#EDE7F6',todo:'#E4F3EB'}[t]||'#F3F1EC';}
function typeLabel(t){return{restaurant:'Restaurant',hotel:'Hotel',todo:'To Do'}[t]||t;}
function typeBadge(t){return{restaurant:'tb-r',hotel:'tb-h',todo:'tb-t'}[t]||'tb-r';}
function openCityModal(){
  document.getElementById('city-grid').innerHTML=D().cities.map(c=>
    `<div class="city-item${c.id===cityId?' active':''}" onclick="setCity('${c.id}')"><span class="city-e">${c.emoji}</span><span class="city-n">${c.label}</span></div>`).join('');
  document.getElementById('city-overlay').classList.add('open');
}
document.getElementById('city-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
function setCity(id){
  cityId=id;const c=cityInfo();
  document.getElementById('city-label').textContent=c.label.split(',')[0];
  document.getElementById('city-pin').textContent=c.emoji;
  document.getElementById('topbar-sub').textContent='Discovering the best of '+c.label;
  document.getElementById('city-overlay').classList.remove('open');
  filter='All';renderDiscover();resetAI();
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='social')renderSocial();
  if(tab==='saved')renderSaved();
}
function renderFilters(){
  document.getElementById('filter-row').innerHTML=FILTERS.map(f=>
    `<button class="chip${f===filter?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('');
}
function setFilter(f){filter=f;renderDiscover();}
function filterPlaces(){
  const ps=places();
  if(filter==='All')return ps;
  if(filter==='Restaurants')return ps.filter(p=>p.type==='restaurant');
  if(filter==='Hotels')return ps.filter(p=>p.type==='hotel');
  if(filter==='Things To Do')return ps.filter(p=>p.type==='todo');
  if(filter==='Date Night')return ps.filter(p=>p.tags.includes('Date Night')||p.vibe==='Romantic');
  if(filter==='Trending')return ps.filter(p=>p.tags.includes('Trending')||p.rating>=4.8);
  if(filter==='Open Now')return ps.filter(p=>p.status==='open');
  return ps;
}
function placeCard(p){
  const saved=savedIds.has(p.id);
  const ac=[['#EDE7F6','#512DA8'],['#E4F3EB','#1B5E35'],['#FFF0E0','#A04800']];
  return`<div class="card" id="card-${p.id}">
    <div class="card-hero" style="background:${heroBg(p.type)}">${p.emoji}
      <div class="type-badge ${typeBadge(p.type)}">${typeLabel(p.type)}</div>
      <div class="rating-pill">★ ${p.rating}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-meta"><span class="dot ${p.status==='open'?'dot-open':'dot-busy'}"></span>${p.status==='open'?'Open':'Busy'} · ${p.wait} · ${p.hours}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="tags"><span class="tag tag-vibe">${p.vibe}</span>${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<span class="tag">${p.price}</span></div>
      <div class="card-footer">
        <button class="btn-save${saved?' saved':''}" id="sb-${p.id}" onclick="toggleSave('${p.id}')">${saved?'🔖 Saved':'+ Save'}</button>
        <button class="btn-more" onclick="viewMore('${p.id}')">Details ↗</button>
      </div>
    </div>
    ${p.friends&&p.friends.length?`<div class="social-strip"><div class="avs">${p.friends.slice(0,3).map((f,i)=>`<div class="av" style="background:${ac[i%3][0]};color:${ac[i%3][1]}">${f}</div>`).join('')}</div><div class="stext">${p.friendText}</div></div>`:''}
  </div>`;
}
function renderDiscover(){
  renderFilters();
  const fp=filterPlaces();
  document.getElementById('card-feed').innerHTML=fp.length?fp.map(placeCard).join(''):'<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">No spots found</div><div class="empty-s">Try a different filter or city</div></div>';
}
function toggleSave(id){
  if(savedIds.has(id))savedIds.delete(id);else savedIds.add(id);
  const btn=document.getElementById('sb-'+id);
  if(btn){btn.textContent=savedIds.has(id)?'🔖 Saved':'+ Save';btn.classList.toggle('saved',savedIds.has(id));}
  const badge=document.getElementById('saved-badge');
  badge.textContent=savedIds.size;badge.style.display=savedIds.size?'block':'none';
  try{localStorage.setItem('locale_saved',JSON.stringify([...savedIds]));}catch(e){}
  if(currentTab==='saved')renderSaved();
}
function renderSaved(){
  const allP=Object.values(D().places||{}).flat();
  const items=allP.filter(p=>savedIds.has(p.id));
  document.getElementById('saved-inner').innerHTML=items.length?items.map(placeCard).join(''):'<div class="empty"><div class="empty-ico">🔖</div><div class="empty-t">Nothing saved yet</div><div class="empty-s">Tap + Save on any spot</div></div>';
}
function renderSocial(){
  document.getElementById('social-inner').innerHTML=SOCIAL.map(s=>`<div class="soc-card" style="margin-bottom:10px"><div class="soc-av" style="background:${s.c};color:${s.tc}">${s.av}</div><div class="soc-info"><div class="soc-name">${s.name}</div><div class="soc-act">${s.e} ${s.act}</div><div class="soc-time">${s.t}</div></div></div>`).join('');
}
function aiFlow(choice){
  aiChoice=choice;const step=AI_STEP2[choice];
  document.getElementById('ai-q').textContent=step.q;
  document.getElementById('ai-opts').innerHTML=step.opts.map(o=>`<button class="ai-opt" onclick="aiStep2('${o.replace(/'/g,"&#39;")}')">${o}</button>`).join('');
}
function aiStep2(opt){
  document.getElementById('ai-opts').innerHTML='';
  document.getElementById('ai-q').textContent='Finding your perfect picks...';
  document.getElementById('ai-loading').style.display='flex';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ask-row').style.display='none';
  document.getElementById('ai-cards').innerHTML='';
  const ps=places();const city=cityInfo().label;
  const list=ps.map(p=>`- ${p.name} (${typeLabel(p.type)}, ${p.vibe} vibe, ${p.price}, ★${p.rating}, ${p.status==='open'?'open now':'currently busy'})`).join('\n');
  const prompt=`User wants a ${aiChoice} outing — specifically: "${opt}". City: ${city}.\n\nAvailable places:\n${list}\n\nGive a warm 2-3 sentence recommendation naming 1-2 specific places. Then on a new line: PICKS: [comma-separated place names from the list above]`;
  callAI(prompt,city,(text,err)=>{
    document.getElementById('ai-loading').style.display='none';
    if(err){document.getElementById('ai-result').innerHTML=`<div class="ai-resp ai-error">⚠️ ${err}</div><button class="ai-reset" onclick="resetAI()">← Try again</button>`;}
    else{
      const m=text.match(/PICKS:\s*(.+)/i);
      const resp=text.replace(/PICKS:.*/is,'').trim();
      const names=m?m[1].split(',').map(s=>s.trim().toLowerCase()):[];
      const picks=ps.filter(p=>names.some(n=>p.name.toLowerCase().includes(n)||n.includes(p.name.toLowerCase().split(' ')[0])));
      const final=picks.length?picks:ps.slice(0,2);
      let html=resp;
      final.forEach(p=>{html=html.replace(new RegExp(p.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),`<span class="hl">${p.name}</span>`);});
      document.getElementById('ai-result').innerHTML=`<div class="ai-resp">${html}</div><button class="ai-reset" onclick="resetAI()">← Try a different vibe</button>`;
      document.getElementById('ai-cards').innerHTML=final.map(placeCard).join('');
    }
    document.getElementById('ai-result').style.display='block';
    document.getElementById('ask-row').style.display='flex';
  });
}
function resetAI(){
  aiChoice='';
  document.getElementById('ai-q').textContent="What's the vibe tonight?";
  document.getElementById('ai-opts').innerHTML=`<button class="ai-opt" onclick="aiFlow('casual')">Something casual &amp; laid-back</button><button class="ai-opt" onclick="aiFlow('upscale')">Upscale — I want to impress</button><button class="ai-opt" onclick="aiFlow('adventure')">Something unique &amp; adventurous</button><button class="ai-opt" onclick="aiFlow('family')">Family-friendly fun</button>`;
  document.getElementById('ai-loading').style.display='none';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ask-row').style.display='none';
  document.getElementById('ai-cards').innerHTML='';
}
function sendAsk(){
  const inp=document.getElementById('ask-inp');const v=inp.value.trim();if(!v)return;
  inp.value='';document.getElementById('ask-btn').disabled=true;
  document.getElementById('ai-loading').style.display='flex';
  const ps=places();const city=cityInfo().label;
  const list=ps.map(p=>`- ${p.name} (${typeLabel(p.type)}, ${p.vibe}, ${p.price}, ★${p.rating})`).join('\n');
  const prompt=`User asks: "${v}". City: ${city}.\n\nAvailable places:\n${list}\n\nAnswer in 2-3 sentences referencing specific places. Then: PICKS: [names]`;
  callAI(prompt,city,(text,err)=>{
    document.getElementById('ai-loading').style.display='none';document.getElementById('ask-btn').disabled=false;
    if(err){document.getElementById('ai-result').innerHTML=`<div class="ai-resp ai-error">⚠️ ${err}</div>`;}
    else{
      const m=text.match(/PICKS:\s*(.+)/i);const resp=text.replace(/PICKS:.*/is,'').trim();
      const names=m?m[1].split(',').map(s=>s.trim().toLowerCase()):[];
      const picks=ps.filter(p=>names.some(n=>p.name.toLowerCase().includes(n)||n.includes(p.name.toLowerCase().split(' ')[0])));
      let html=resp;
      picks.forEach(p=>{html=html.replace(new RegExp(p.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),`<span class="hl">${p.name}</span>`);});
      document.getElementById('ai-result').innerHTML=`<div class="ai-resp">${html}</div><button class="ai-reset" onclick="resetAI()">← Start over</button>`;
      if(picks.length)document.getElementById('ai-cards').innerHTML=picks.map(placeCard).join('');
    }
    document.getElementById('ai-result').style.display='block';
  });
}
function viewMore(id){
  const allP=Object.values(D().places||{}).flat();
  const p=allP.find(x=>x.id===id);if(!p)return;
  switchTab('ai');
  document.getElementById('ai-opts').innerHTML='';
  document.getElementById('ai-q').textContent='Getting the scoop on '+p.name+'...';
  document.getElementById('ai-loading').style.display='flex';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ask-row').style.display='none';
  document.getElementById('ai-cards').innerHTML='';
  const city=cityInfo().label;
  const prompt=`Tell me about ${p.name} in ${city} in 3-4 sentences. What makes it special, best time to go, what to order or do, and one insider tip. Be conversational. Then: PICKS: ${p.name}`;
  callAI(prompt,city,(text,err)=>{
    document.getElementById('ai-loading').style.display='none';
    if(err){document.getElementById('ai-result').innerHTML=`<div class="ai-resp ai-error">⚠️ ${err}</div>`;}
    else{
      const resp=text.replace(/PICKS:.*/is,'').trim();
      let html=resp.replace(new RegExp(p.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),`<span class="hl">${p.name}</span>`);
      document.getElementById('ai-q').textContent=p.name;
      document.getElementById('ai-result').innerHTML=`<div class="ai-resp">${html}</div><button class="ai-reset" onclick="resetAI()">← Back to AI picks</button>`;
      document.getElementById('ai-cards').innerHTML=placeCard(p);
    }
    document.getElementById('ai-result').style.display='block';
    document.getElementById('ask-row').style.display='flex';
  });
}
async function callAI(prompt,city,cb){
  try{
    const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,city})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'API error');
    cb(data.text||'No response.',null);
  }catch(e){cb(null,e.message.includes('fetch')?'Could not reach the server.':e.message);}
}
function openAuth(){
  if(currentUser){if(confirm('Sign out of '+currentUser.username+'?')){currentUser=null;try{localStorage.removeItem('locale_user');}catch(e){}document.getElementById('profile-btn').textContent='👤';}return;}
  document.getElementById('auth-overlay').classList.add('open');
}
document.getElementById('auth-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
function switchAuthTab(tab){
  document.getElementById('atab-login').classList.toggle('active',tab==='login');
  document.getElementById('atab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('auth-register-form').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-err').textContent='';
}
async function doAuth(action){
  const u=(action==='login'?document.getElementById('login-user'):document.getElementById('reg-user')).value.trim();
  const e=(action==='login'?document.getElementById('login-email'):document.getElementById('reg-email')).value.trim();
  if(!u||!e){document.getElementById('auth-err').textContent='Please fill in all fields.';return;}
  try{
    const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,username:u,email:e})});
    const data=await res.json();if(!res.ok)throw new Error(data.error);
    currentUser=data.user;try{localStorage.setItem('locale_user',JSON.stringify(currentUser));}catch(er){}
    document.getElementById('profile-btn').textContent=currentUser.avatar;
    document.getElementById('topbar-sub').textContent='Welcome back, '+currentUser.username+'! 👋';
    document.getElementById('auth-overlay').classList.remove('open');
  }catch(er){document.getElementById('auth-err').textContent=er.message||'Something went wrong.';}
}
try{const s=localStorage.getItem('locale_saved');if(s){savedIds=new Set(JSON.parse(s));if(savedIds.size){document.getElementById('saved-badge').style.display='block';document.getElementById('saved-badge').textContent=savedIds.size;}}}catch(e){}
try{const u=localStorage.getItem('locale_user');if(u){currentUser=JSON.parse(u);document.getElementById('profile-btn').textContent=currentUser.avatar;}}catch(e){}
renderDiscover();
</script>
</body>
</html>
